{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white border-bottom">
        <strong>Add New Customer</strong>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}

          {% if branches %}
          <div class="mb-3">
            <label class="form-label">Branch <span class="text-danger">*</span></label>
            <select name="branch" class="form-select" required>
              <option value="">-- Select Branch --</option>
              {% for branch in branches %}
                <option value="{{ branch.id }}">{{ branch.name }}</option>
              {% endfor %}
            </select>
          </div>
          {% endif %}

          <div class="mb-3">
            <label class="form-label">Customer Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required
                   placeholder="Full name or business name">
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" name="phone" class="form-control"
                   placeholder="e.g. 0712345678">
          </div>
          <div class="mb-3">
            <label class="form-label">Credit Limit (TZS)</label>
            <input type="number" name="credit_limit" class="form-control"
                   step="1000" min="0" value="0"
                   placeholder="0 = no credit allowed">
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-person-plus me-1"></i> Add Customer
            </button>
            <a href="{% url 'customer_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
